name: Sync Mirror

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  git-sync:
    if: github.repository == 'awslabs/aws-sdk-swift'
    runs-on: ubuntu-latest

    steps:
      - name: git-sync
        uses: wei/git-sync@55c6b63b4f21607da0e9877ca9b4d11a29fc6d83 # v3.0.0
        with:
          source_repo: ${{ secrets.GIT_SYNC_SOURCE_REPO }}
          source_branch: "main"
          destination_repo: ${{ secrets.GIT_SYNC_DESTINATION_REPO }}
          destination_branch: "main"
          destination_ssh_private_key:  ${{ secrets.GIT_SYNC_DESTINATION_PRIVATE_DEPLOY_KEY }}
